name: Deploy Digits API

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Azure Functions Core Tools
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Clear WEBSITE_RUN_FROM_PACKAGE
        run: |
          az functionapp config appsettings delete \
            --name digits-api-prod-hwbxtkz6lsfoq \
            --resource-group my-website-prod-rg \
            --setting-names WEBSITE_RUN_FROM_PACKAGE WEBSITE_CONTENTAZUREFILECONNECTIONSTRING WEBSITE_CONTENTSHARE

      - name: Deploy to Azure Functions
        run: func azure functionapp publish digits-api-prod-hwbxtkz6lsfoq --python

  update-architecture:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout my-website
        uses: actions/checkout@v4
        with:
          repository: skarumbu/my-website
          token: ${{ secrets.MY_WEBSITE_DISPATCH_TOKEN }}

      - name: Update deploy metadata
        run: |
          git pull origin main
          DATE=$(date -u +%Y-%m-%d)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          python3 -c "
import json
with open('src/architecture-metadata.json') as f:
    meta = json.load(f)
meta['digits'] = {'lastDeploy': '$DATE', 'commitSha': '$SHORT_SHA'}
with open('src/architecture-metadata.json', 'w') as f:
    json.dump(meta, f, indent=2)
    f.write('\n')
"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/architecture-metadata.json
          git diff --staged --quiet && exit 0
          git commit -m "chore: update digits deploy metadata"
          git push
